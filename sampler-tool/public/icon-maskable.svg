<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6f3d"/>
      <stop offset="1" stop-color="#c43614"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ede7d3"/>
      <stop offset="1" stop-color="#c9c2ad"/>
    </linearGradient>
  </defs>
  <!-- Maskable icons must keep the brand inside a center safe zone (~80% radius) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(160 160)">
    <g fill="url(#pad)" stroke="#a8a18c" stroke-width="3">
      <rect x="0"   y="0"   width="44" height="44" rx="7"/>
      <rect x="56"  y="0"   width="44" height="44" rx="7"/>
      <rect x="112" y="0"   width="44" height="44" rx="7"/>
      <rect x="168" y="0"   width="44" height="44" rx="7"/>
      <rect x="0"   y="56"  width="44" height="44" rx="7"/>
      <rect x="56"  y="56"  width="44" height="44" rx="7"/>
      <rect x="112" y="56"  width="44" height="44" rx="7"/>
      <rect x="168" y="56"  width="44" height="44" rx="7"/>
      <rect x="0"   y="112" width="44" height="44" rx="7"/>
      <rect x="56"  y="112" width="44" height="44" rx="7"/>
      <rect x="112" y="112" width="44" height="44" rx="7"/>
      <rect x="168" y="112" width="44" height="44" rx="7"/>
      <rect x="0"   y="168" width="44" height="44" rx="7"/>
      <rect x="56"  y="168" width="44" height="44" rx="7"/>
      <rect x="112" y="168" width="44" height="44" rx="7"/>
      <rect x="168" y="168" width="44" height="44" rx="7"/>
    </g>
    <g fill="#ffcc1a" stroke="#c9a020" stroke-width="3">
      <rect x="0"   y="0"   width="44" height="44" rx="7"/>
      <rect x="56"  y="56"  width="44" height="44" rx="7"/>
      <rect x="112" y="112" width="44" height="44" rx="7"/>
      <rect x="168" y="168" width="44" height="44" rx="7"/>
    </g>
  </g>
</svg>
